# Audit allow-list (cycle 29.2 (d) periodic audit).
#
# Stocks listed here are suppressed from the daily audit alert. Each
# entry matches on the composite key (stock_id, action_date) per
# refinement note 3 — a second corporate action on a previously-known
# stock will surface as a new outlier (alerts again).
#
# Status values:
#   "purged"  — pre-event OHLC bars deleted from the database. Allow-list
#               entry is permanent (the scan window's content will
#               eventually no longer contain the discontinuity, but the
#               allow-list match is harmless either way).
#   "skip"    — discontinuity is a legitimate market event (large move,
#               not a corporate action). The allow-list entry auto-
#               expires when the event_date falls outside the audit
#               lookback window (DEFAULT_LOOKBACK_DAYS = 60 calendar
#               days). No manual cleanup needed.
#   "pending" — flagged but action not yet decided. Treated as known for
#               now (suppresses alerts) but should be reviewed
#               periodically. If left as "pending" indefinitely, the
#               status itself becomes a deferred-decision signal.
#
# To add a new entry:
#   1. Verify via TWSE 公開資訊觀測站 whether the discontinuity is a real
#      corporate action (per §4.4 coupling discipline — don't suppress
#      alerts on legitimate market data).
#   2. Choose status. Default to "pending" if undecided.
#   3. Set action_date to the resumption / post-action date (the date
#      that appears as event_date in the audit scan output).
#   4. Include a note explaining the decision basis.

